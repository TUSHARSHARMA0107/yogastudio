name: Build my app

on:
  push:
    branches: [main]

jobs:
  build-react-app:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7.0.0

      - name: Setup Nodejs
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 22.x

      - name: Install Dependencies
        run: npm install

      - name: Build Angular App
        run: npm run build
