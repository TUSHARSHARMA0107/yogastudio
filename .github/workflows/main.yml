name: Build my app

on:
  push:
    branches: [main]

jobs:
  build-react-app:
    runs-on: ubuntu-latest

    # This applies the subfolder path to all steps below
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - uses: actions/checkout@v7.0.0

      - name: Setup Nodejs
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 22.x
          cache: "npm"

      - name: Install Dependencies
        run: npm install

      - name: Build React App
        run: npm run build

      - name: Upload Build on Artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          name: reactjs-build
          path: out/

